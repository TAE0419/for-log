<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./brandstory.css"/>
    <link rel="stylesheet" href="../common/FontAndColor/FontAndColor.css">
</head>
<body>
    <div id="headers"></div>

    <!-- =================================타이틀================================= -->
    <section class="first">
        <div class='titleBox'>
            <div class="light">
                <img src="../common/img/Star.png" alt="star"/>
                <img src="../common/img/Star.png" alt="star"/>
            </div>
            <h1>BRAND<br>STORY</h1>
            <div class="light">
                <img src="../common/img/Star.png" alt="star"/>
                <img src="../common/img/Star.png" alt="star"/>
            </div>
        </div>
        <div class="glassesChologi"></div>
    </section>
    <!-- ================================의의=========================================== -->
    <section class="seconde">
        <div class="textBox">
            <h1>지친 일상을 다독이는<br>작은 숲속 친구들</h1>
            <img class="logo"/>
            <p>회색빛 일상을 생기로 가득 채우기 위해, 싱그러운 식물들과 발랄하게 뛰어노는 초로기가 당신의 공간에 산뜻한 분위기를 더해드립니다.<br>
                포로그가 선보이는 상품들은 단순한 장식이 아닙니다. 매일 손이 닿는 실용적인 잡화들 속에 자연의 포근함과 초로기의 사랑스러움을 꼼꼼하게 채워 넣었습니다.
                <br>당신의 하루를 소박하게 정돈해 주는 작은 숲으로 놀러 오세요.</p>
        </div>
        <div class="plantPictogram"></div>
        <div class="productPictogram"></div>
    </section>

    <!-- ========================================컨셉=============================== -->
    <section class="third">
        <div class="stripe">
            <div class="gradiant"></div>
            <img src="../common/img/pattern.png"/>
        </div>
        <div class="titleBox">
            <div class="circle"></div>
            <h1>CONCEPT</h1>
        </div>
        <div class="clover1"></div>
        <div class="clover2"></div>
        <div class="clover3"></div>
    </section>
    <!-- =========================================마스코트================================== -->
    <section class="fourth">
        <div class="gradiant"></div>
        <div class="stripe">
            <img src="../common/img/pattern.png"/>
        </div>
        <div class="titleBox">
            <h1>CHOLOGI</h1>
            <p>초로기</p>
        </div>
        <div class="gradiant"></div>
    </section>
    <!-- =========================================디자인======================================= -->
    <section class="fifth">
        <div class="up">
            <div class="titleBox"></div>
            <div class="colorBox"></div>
        </div>
        <div class="down">
            <div class="logo"></div>
            <hr style="border: none; border-top: 2px dashed var(--bg-color);">
            <div class="text"></div>
        </div>
    </section>

    <div id="footer">
        <div class="frill"></div>
    </div>
    
    <script src="../common/header.js"></script>
    <script>
        fetch('../common/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('headers').innerHTML = data;
                initHeader(); 
            });
        fetch('../common/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;

            });
    </script>
    
</body>
</html>
